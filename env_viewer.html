<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环境快照查看器</title>
<style>
  :root { --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--red:#da3633; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;}
  .container{max-width:1400px;margin:0 auto;}
  h1{text-align:center;margin-bottom:5px;}
  .subtitle{text-align:center;color:var(--dim);margin-bottom:24px;font-size:14px;}
  .toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .toolbar input{flex:1;min-width:200px;padding:8px 14px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:14px;}
  .toolbar select,.toolbar button{padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);cursor:pointer;font-size:14px;}
  .toolbar button:hover{border-color:var(--accent);}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px;}
  .summary .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;}
  .summary .card .num{font-size:36px;font-weight:bold;color:var(--accent);}
  .summary .card .label{color:var(--dim);font-size:13px;margin-top:4px;}
  .section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px;}
  .section h2{font-size:18px;margin-bottom:12px;}
  .section h2 .count{font-size:14px;color:var(--dim);}
  .pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;}
  .pkg-item{padding:6px 10px;border-radius:4px;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
  .pkg-item:hover{background:var(--border);}
  .pkg-item .name{font-family:monospace;}
  .pkg-item .ver{color:var(--dim);font-size:11px;}
  .empty{color:var(--dim);text-align:center;padding:20px;}
  .diff-added{color:var(--green);}
  .diff-removed{color:var(--red);text-decoration:line-through;}
  .meta-path{color:var(--dim);font-size:12px;margin:8px 0 4px;word-break:break-all;}
</style>
</head>
<body>
<div class="container">
  <h1>📦 环境快照查看器</h1>
  <p class="subtitle">AI Agents · Pip · npm — 全局 vs 项目</p>

  <div class="toolbar">
    <input type="text" id="search" placeholder="🔍 搜索..." oninput="render()">
    <select id="scopeFilter" onchange="render()">
      <option value="all">全部</option><option value="global">🌐 全局</option><option value="project">📁 项目</option>
    </select>
    <select id="snapshotSelect" onchange="switchSnapshot()"></select>
    <button onclick="switchToLatest()">最新</button>
    <button onclick="showDiff()">📊 对比变化</button>
  </div>
  <div class="summary" id="summary"></div>
  <div id="content"></div>
</div>

<script>
let snapshots=[],currentIdx=-1;

async function load(){
  try{
    const r=await fetch('env_snapshots.json');
    snapshots=await r.json();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="section"><p class="empty">⚠️ 未找到快照文件。请运行 python tools/record_env.py --web</p></div>';
    return;
  }
  // 兼容新旧格式: skills -> ai_agents, npm_global -> npm_packages
  snapshots=snapshots.map(s=>({
    ...s,
    ai_agents: s.ai_agents||s.skills||[],
    npm_packages: s.npm_packages||s.npm_global||[]
  }));
  if(!snapshots.length)return;
  currentIdx=snapshots.length-1;
  const sel=document.getElementById('snapshotSelect');
  snapshots.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s.time?.slice(0,19)||`#${i+1}`;sel.appendChild(o);});
  sel.value=currentIdx;
  render();
}

function switchSnapshot(){currentIdx=+document.getElementById('snapshotSelect').value;render();}
function switchToLatest(){currentIdx=snapshots.length-1;document.getElementById('snapshotSelect').value=currentIdx;render();}

function render(){
  if(!snapshots.length||currentIdx<0)return;
  const s=snapshots[currentIdx],q=document.getElementById('search').value.toLowerCase(),sc=document.getElementById('scopeFilter').value;

  const ag=s.ai_agents||[],pip=s.pip_packages||[],npm=s.npm_packages||[];
  const agG=ag.filter(x=>x.scope==='global').length,agP=ag.filter(x=>x.scope==='project').length;
  const pipG=pip.filter(x=>x.scope==='global').length,pipP=pip.filter(x=>x.scope==='project').length;
  const npmG=npm.filter(x=>x.scope==='global').length,npmP=npm.filter(x=>x.scope==='project').length;

  document.getElementById('summary').innerHTML=`
    <div class="card"><div class="num">${ag.length}</div><div class="label">🤖 AI Agents (${agG} 全局 + ${agP} 项目)</div></div>
    <div class="card"><div class="num">${pip.length}</div><div class="label">🐍 Pip (${pipG} 全局 + ${pipP} 项目)</div></div>
    <div class="card"><div class="num">${npm.length}</div><div class="label">📦 npm (${npmG} 全局 + ${npmP} 项目)</div></div>
    <div class="card"><div class="num">${s.time?.slice(0,10)}</div><div class="label">📅 快照日期</div></div>`;

  let h=renderAgents(ag,q,sc);
  h+=renderPkgs('🐍 Pip',pip,q,sc);
  h+=renderPkgs('📦 npm',npm,q,sc);
  document.getElementById('content').innerHTML=h;
}

function renderAgents(items,search,scope){
  const f=items.filter(x=>{
    if(scope!=='all'&&x.scope!==scope)return false;
    if(search&&!(x.name+(x.project||'')+(x.tool||'')).toLowerCase().includes(search))return false;
    return true;
  });
  let h=`<div class="section"><h2>🤖 AI Agents <span class="count">${f.length} 个</span></h2>`;
  if(!f.length){h+='<p class="empty">无匹配</p></div>';return h;}
  const g={};
  f.forEach(x=>{
    const t=x.tool||'?';
    const k=x.scope==='global'?`🌐 ${t} 全局`: `📁 ${t} [${x.project||'?'}]`;
    g[k]=g[k]||[];g[k].push(x);
  });
  for(const[k,items]of Object.entries(g)){
    h+=`<p class="meta-path">${k} (${items.length})</p><div class="pkg-grid">`;
    items.forEach(x=>{h+=`<div class="pkg-item"><span class="name">📄 ${x.name}</span></div>`;});
    h+='</div>';
  }
  h+='</div>';return h;
}

function renderPkgs(title,items,search,scope){
  const f=items.filter(x=>{
    if(scope!=='all'&&x.scope!==scope)return false;
    if(search&&!(x.name+x.version).toLowerCase().includes(search))return false;
    return true;
  });
  const gG=f.filter(x=>x.scope==='global'),gP=f.filter(x=>x.scope==='project');
  let h=`<div class="section"><h2>${title} <span class="count">${f.length} 个</span></h2>`;
  if(!f.length){h+='<p class="empty">无匹配</p></div>';return h;}
  if(gG.length){h+=`<p class="meta-path">🌐 全局 (${gG.length})</p><div class="pkg-grid">`;gG.forEach(x=>{h+=`<div class="pkg-item"><span class="name">${x.name}</span><span class="ver">${x.version||''}</span></div>`;});h+='</div>';}
  if(gP.length){h+=`<p class="meta-path">📁 项目 (${gP.length})</p><div class="pkg-grid">`;gP.forEach(x=>{h+=`<div class="pkg-item"><span class="name">${x.name}</span><span class="ver">${x.version||''}</span></div>`;});h+='</div>';}
  h+='</div>';return h;
}

function showDiff(){
  if(snapshots.length<2){alert('需要至少2条快照');return;}
  const o=snapshots[snapshots.length-2],n=snapshots[snapshots.length-1];
  const oAg=new Set(o.ai_agents.map(x=>x.tool+'|'+x.name));
  const nAg=new Set(n.ai_agents.map(x=>x.tool+'|'+x.name));
  const addAg=[...nAg].filter(x=>!oAg.has(x)),rmAg=[...oAg].filter(x=>!nAg.has(x));
  const oPip={};o.pip_packages.forEach(x=>oPip[x.name]=x.version);
  const nPip={};n.pip_packages.forEach(x=>nPip[x.name]=x.version);
  const addPip=Object.keys(nPip).filter(x=>!(x in oPip));
  const rmPip=Object.keys(oPip).filter(x=>!(x in nPip));

  let h=`<div class="section"><h2>📊 ${o.time?.slice(0,19)} → ${n.time?.slice(0,19)}</h2>`;
  if(addAg.length)h+=`<p>➕ 新增 (${addAg.length})</p>`+addAg.map(x=>`<p class="diff-added">+ ${x}</p>`).join('');
  if(rmAg.length)h+=`<p>➖ 移除 (${rmAg.length})</p>`+rmAg.map(x=>`<p class="diff-removed">- ${x}</p>`).join('');
  if(addPip.length)h+=`<p>➕ 新增 Pip (${addPip.length})</p>`+addPip.map(x=>`<p class="diff-added">+ ${x}</p>`).join('');
  if(rmPip.length)h+=`<p>➖ 移除 Pip (${rmPip.length})</p>`+rmPip.map(x=>`<p class="diff-removed">- ${x}</p>`).join('');
  if(!addAg.length&&!rmAg.length&&!addPip.length&&!rmPip.length)h+='<p class="empty">✅ 无变化</p>';
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

load();
</script>
</body>
</html>
