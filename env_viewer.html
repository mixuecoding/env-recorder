<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环境快照查看器</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d2991d; --red: #da3633;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
  .container { max-width: 1400px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 5px; }
  .subtitle { text-align: center; color: var(--dim); margin-bottom: 24px; font-size: 14px; }
  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .toolbar input { flex: 1; min-width: 200px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); font-size: 14px; }
  .toolbar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); font-size: 14px; }
  .toolbar button { padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); cursor: pointer; font-size: 14px; }
  .toolbar button:hover { border-color: var(--accent); }
  .toolbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .summary .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .summary .card .num { font-size: 36px; font-weight: bold; color: var(--accent); }
  .summary .card .label { color: var(--dim); font-size: 13px; margin-top: 4px; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .section h2 { font-size: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section h2 .path { font-size: 12px; color: var(--dim); font-weight: normal; font-family: monospace; }
  .section h2 .count { font-size: 14px; color: var(--dim); }
  .pkg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; }
  .pkg-item { padding: 6px 10px; border-radius: 4px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .pkg-item:hover { background: var(--border); }
  .pkg-item .name { font-family: monospace; }
  .pkg-item .ver { color: var(--dim); font-size: 11px; }
  .pkg-item.highlight { background: #1a3a2a; border: 1px solid #2ea043; }
  .scope-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-right: 4px; }
  .scope-global { background: #1f6feb33; color: #58a6ff; }
  .scope-project { background: #3fb95033; color: #3fb950; }
  .empty { color: var(--dim); text-align: center; padding: 20px; }
  .diff-added { color: var(--green); }
  .diff-removed { color: var(--red); text-decoration: line-through; }
  .diff-changed { color: var(--orange); }
  .hidden { display: none; }
  .meta-path { word-break: break-all; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>📦 环境快照查看器</h1>
  <p class="subtitle">Skills · Pip · npm — 全局 vs 项目，一目了然</p>

  <div class="toolbar">
    <input type="text" id="search" placeholder="🔍 搜索包名..." oninput="render()">
    <select id="scopeFilter" onchange="render()">
      <option value="all">全部范围</option>
      <option value="global">🌐 全局</option>
      <option value="project">📁 项目</option>
    </select>
    <select id="snapshotSelect" onchange="switchSnapshot()"></select>
    <button id="btnLatest" onclick="switchToLatest()">最新</button>
    <button onclick="showDiff()">📊 对比变化</button>
  </div>

  <div class="summary" id="summary"></div>
  <div id="content"></div>
</div>

<script>
let snapshots = [];
let currentIdx = -1;

async function load() {
  // 同目录下的快照文件（由 record_env.py --web 自动复制）
  try {
    const resp = await fetch('env_snapshots.json');
    snapshots = await resp.json();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="section"><p class="empty">⚠️ 未找到快照文件。<br>请运行 <code>python tools/record_env.py --web</code> 启动查看器</p></div>';
    return;
  }

  if (!snapshots.length) return;
  currentIdx = snapshots.length - 1;

  // 填充快照选择器
  const sel = document.getElementById('snapshotSelect');
  snapshots.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.time?.slice(0, 19) || `快照 #${i+1}`;
    sel.appendChild(opt);
  });
  sel.value = currentIdx;

  render();
}

function switchSnapshot() {
  currentIdx = parseInt(document.getElementById('snapshotSelect').value);
  render();
}

function switchToLatest() {
  currentIdx = snapshots.length - 1;
  document.getElementById('snapshotSelect').value = currentIdx;
  render();
}

function render() {
  if (!snapshots.length || currentIdx < 0) return;
  const s = snapshots[currentIdx];
  const search = document.getElementById('search').value.toLowerCase();
  const scope = document.getElementById('scopeFilter').value;

  // 摘要卡片
  const skills_global = s.skills.filter(sk => sk.scope === 'global').length;
  const skills_proj = s.skills.filter(sk => sk.scope === 'project').length;
  const pip_global = s.pip_packages.filter(p => p.scope === 'global').length;
  const pip_proj = s.pip_packages.filter(p => p.scope === 'project').length;
  const npm_global = (s.npm_global || []).filter(p => p.scope === 'global').length;
  const npm_proj = (s.npm_global || []).filter(p => p.scope === 'project').length;

  document.getElementById('summary').innerHTML = `
    <div class="card"><div class="num">${s.skills.length}</div><div class="label">📦 Skills (${skills_global} 全局 + ${skills_proj} 项目)</div></div>
    <div class="card"><div class="num">${s.pip_packages.length}</div><div class="label">🐍 Pip (${pip_global} 全局 + ${pip_proj} 项目)</div></div>
    <div class="card"><div class="num">${(s.npm_global || []).length}</div><div class="label">📦 npm (${npm_global} 全局 + ${npm_proj} 项目)</div></div>
    <div class="card"><div class="num">${s.time?.slice(0, 10)}</div><div class="label">📅 快照日期</div></div>
  `;

  // Skills
  let html = renderSkills(s, search, scope);
  html += renderPip(s, search, scope);
  html += renderNpm(s, search, scope);
  document.getElementById('content').innerHTML = html;
}

function filterScope(list, scope, search, keyFn) {
  return list.filter(item => {
    if (scope !== 'all' && item.scope !== scope) return false;
    if (search && !keyFn(item).toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderSkills(s, search, scope) {
  const filtered = filterScope(s.skills, scope, search, sk => sk.name + (sk.project || ''));
  // 分组
  const groups = {};
  filtered.forEach(sk => {
    const key = sk.scope === 'global' ? '🌐 全局 (~/.claude/skills/)' : `📁 ${sk.project || 'unknown'} (<项目>/.claude/skills/)`;
    groups[key] = groups[key] || [];
    groups[key].push(sk);
  });

  let html = `<div class="section"><h2>📦 Skills <span class="count">${filtered.length} 个</span></h2>`;
  if (!filtered.length) { html += '<p class="empty">无匹配项</p></div>'; return html; }
  for (const [group, items] of Object.entries(groups)) {
    html += `<p class="meta-path">${group} (${items.length})</p>`;
    html += '<div class="pkg-grid">';
    items.forEach(sk => {
      html += `<div class="pkg-item"><span class="name">📄 ${sk.name}</span></div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderPip(s, search, scope) {
  const filtered = filterScope(s.pip_packages, scope, search, p => p.name + p.version);
  const g = filtered.filter(p => p.scope === 'global');
  const pj = filtered.filter(p => p.scope === 'project');

  let html = `<div class="section"><h2>🐍 Pip <span class="count">${filtered.length} 个</span></h2>`;
  if (!filtered.length) { html += '<p class="empty">无匹配项</p></div>'; return html; }
  if (g.length) {
    html += `<p class="meta-path">🌐 全局 · C:\\Users\\...\\Python\\Python312\\site-packages (${g.length})</p>`;
    html += '<div class="pkg-grid">';
    g.forEach(p => { html += `<div class="pkg-item"><span class="name">${p.name}</span><span class="ver">${p.version}</span></div>`; });
    html += '</div>';
  }
  if (pj.length) {
    html += `<p class="meta-path">📁 项目 venv · ${pj[0].version || ''} (${pj.length})</p>`;
    html += '<div class="pkg-grid">';
    pj.forEach(p => { html += `<div class="pkg-item"><span class="name">${p.name}</span><span class="ver">${p.version}</span></div>`; });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderNpm(s, search, scope) {
  const pkgs = s.npm_global || [];
  const filtered = filterScope(pkgs, scope, search, p => p.name + p.version);
  const g = filtered.filter(p => p.scope === 'global');
  const pj = filtered.filter(p => p.scope === 'project');

  let html = `<div class="section"><h2>📦 npm <span class="count">${filtered.length} 个</span></h2>`;
  if (!filtered.length) { html += '<p class="empty">无匹配项</p></div>'; return html; }
  if (g.length) {
    html += `<p class="meta-path">🌐 全局 · %APPDATA%/npm/node_modules (${g.length})</p>`;
    html += '<div class="pkg-grid">';
    g.forEach(p => { html += `<div class="pkg-item"><span class="name">${p.name}</span><span class="ver">${p.version}</span></div>`; });
    html += '</div>';
  }
  if (pj.length) {
    html += `<p class="meta-path">📁 项目 · ./node_modules (${pj.length})</p>`;
    html += '<div class="pkg-grid">';
    pj.forEach(p => { html += `<div class="pkg-item"><span class="name">${p.name}</span><span class="ver">${p.version}</span></div>`; });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function showDiff() {
  if (snapshots.length < 2) { alert('需要至少 2 条快照才能对比'); return; }
  const old = snapshots[snapshots.length - 2];
  const nw = snapshots[snapshots.length - 1];

  const oldSkills = new Set(old.skills.map(s => s.scope + '|' + s.project + '|' + s.name));
  const newSkills = new Set(nw.skills.map(s => s.scope + '|' + s.project + '|' + s.name));
  const addedSkills = [...newSkills].filter(x => !oldSkills.has(x));
  const removedSkills = [...oldSkills].filter(x => !newSkills.has(x));

  const oldPip = new Set(old.pip_packages.map(p => p.name));
  const newPip = new Set(nw.pip_packages.map(p => p.name));
  const addedPip = [...newPip].filter(x => !oldPip.has(x));
  const removedPip = [...oldPip].filter(x => !newPip.has(x));

  const oldNpm = new Set((old.npm_global || []).map(p => p.name));
  const newNpm = new Set((nw.npm_global || []).map(p => p.name));
  const addedNpm = [...newNpm].filter(x => !oldNpm.has(x));
  const removedNpm = [...oldNpm].filter(x => !newNpm.has(x));

  const total = addedSkills.length + removedSkills.length + addedPip.length + removedPip.length + addedNpm.length + removedNpm.length;

  let html = `<div class="section"><h2>📊 对比: ${old.time?.slice(0,19)} → ${nw.time?.slice(0,19)}</h2>`;
  if (!total) { html += '<p class="empty">✅ 无变化</p></div>'; }

  if (addedSkills.length) {
    html += `<p>➕ 新增 Skills (${addedSkills.length})</p>`;
    addedSkills.forEach(s => { html += `<p class="diff-added">   + ${s}</p>`; });
  }
  if (removedSkills.length) {
    html += `<p>➖ 移除 Skills (${removedSkills.length})</p>`;
    removedSkills.forEach(s => { html += `<p class="diff-removed">   - ${s}</p>`; });
  }
  if (addedPip.length) {
    html += `<p>➕ 新增 Pip 包 (${addedPip.length})</p>`;
    addedPip.forEach(s => { html += `<p class="diff-added">   + ${s}</p>`; });
  }
  if (removedPip.length) {
    html += `<p>➖ 移除 Pip 包 (${removedPip.length})</p>`;
    removedPip.forEach(s => { html += `<p class="diff-removed">   - ${s}</p>`; });
  }
  if (addedNpm.length) {
    html += `<p>➕ 新增 npm 包 (${addedNpm.length})</p>`;
    addedNpm.forEach(s => { html += `<p class="diff-added">   + ${s}</p>`; });
  }
  if (removedNpm.length) {
    html += `<p>➖ 移除 npm 包 (${removedNpm.length})</p>`;
    removedNpm.forEach(s => { html += `<p class="diff-removed">   - ${s}</p>`; });
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

load();
</script>
</body>
</html>
